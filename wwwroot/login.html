<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <!-- Подключаем Bootstrap для красоты -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="card shadow bg-secondary text-white" style="width: 100%; max-width: 400px;">
        <div class="card-header bg-dark text-center py-3">
            <h4 class="mb-0">🔒 Вход в Админ-Панель</h4>
        </div>
        <div class="card-body p-4">
            <!-- Action и Method остаются как в Метаните -->
            <form action="/login" method="post">
                <div class="mb-3">
                    <label for="login" class="form-label">Логин</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="login" name="login" required placeholder="Введите логин">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" required placeholder="Введите пароль">
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary py-2">Войти</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
